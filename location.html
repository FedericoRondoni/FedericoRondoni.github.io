<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location — Elisa e Federico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page">

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <button class="burger" id="burger" aria-label="Apri menu" type="button">
        <span></span><span></span><span></span>
      </button>

      <div class="header-title" style="opacity:.92;">Elisa e Federico</div>

      <nav class="nav-panel" id="navPanel" aria-label="Navigazione">
        <a href="index.html">Home</a>
        <a href="location.html">Location</a>
        <a href="index.html#rsvp">RSVP</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">Location</h1>
      <div class="subtitle" style="margin-bottom: 10px;">
        Abbazia Castel d'Alfiolo<br>
        Gubbio
      </div>

      <div class="map">
        <iframe
          src="https://www.google.com/maps?q=Abbazia%20Castel%20d%27Alfiolo%20Gubbio&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>

      <p style="opacity:.7; margin-top:22px; max-width: 760px; line-height: 1.6;">
        Indicazioni: uscita Fossato di Vico → seguire per Gubbio → Castel d'Alfiolo.
      </p>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
    });

    const header = document.getElementById('siteHeader');
    const burger = document.getElementById('burger');

    burger.addEventListener('click', () => header.classList.toggle('open'));

    document.querySelectorAll('.nav-panel a').forEach(a => {
      a.addEventListener('click', () => header.classList.remove('open'));
    });

    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');
        if (href && href.startsWith('#')) return;
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });
  </script>

</body>
</html>
