<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location</title>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Work Sans', sans-serif;
  color:white;
  background: radial-gradient(circle at center, #1a2f6b 0%, #020611 80%);
}

/* MENU */
.menu {
  position:fixed;
  top:30px;
  left:50%;
  transform:translateX(-50%);
}
.hamburger span {
  display:block;
  width:30px;
  height:3px;
  background:white;
  margin:6px auto;
  border-radius:4px;
}
.menu-content {
  display:none;
  background:rgba(0,0,0,0.85);
  padding:15px;
  border-radius:12px;
}
.menu.open .menu-content {display:block;}
.menu-content a {
  color:white;
  display:block;
  padding:6px;
  text-decoration:none;
}

/* CONTENT */
.container {
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1 { font-weight:300; }

.map {
  width:80%;
  max-width:600px;
  height:300px;
  margin-top:20px;
}

iframe {
  width:100%;
  height:100%;
  border:0;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="menu" onclick="this.classList.toggle('open')">
  <div class="hamburger">
    <span></span><span></span><span></span>
  </div>
  <div class="menu-content">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="index.html#rsvp">RSVP</a>
  </div>
</div>

<div class="container">
  <h1>Location</h1>
  <p>Monastero Castel d'Alfiolo</p>
  <p>Gubbio</p>

  <div class="map">
    <iframe src="https://maps.google.com/maps?q=Monastero%20Castel%20d%27Alfiolo%20Gubbio&output=embed"></iframe>
  </div>

  <p style="margin-top:20px;opacity:0.7;">
    Indicazioni: uscita Fossato di Vico → seguire per Gubbio → Castel d'Alfiolo
  </p>
</div>

</body>
</html>
