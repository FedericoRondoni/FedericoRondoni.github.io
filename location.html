<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location</title>

<!-- ✅ FIXED FONT -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Work Sans', sans-serif;
  color:white;
  background: radial-gradient(circle at center, #1a2f6b 0%, #020611 80%);
  opacity:0;
  transition: opacity 0.8s ease;
}

body.loaded {
  opacity:1;
}

/* MENU (same style as homepage) */
.menu {
  position:fixed;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
}

.hamburger span {
  display:block;
  width:30px;
  height:3px;
  background:white;
  margin:6px auto;
  border-radius:4px;
}

.menu-content {
  display:none;
  background:rgba(0,0,0,0.85);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

.menu.open .menu-content {display:block;}

.menu-content a {
  display:block;
  color:white;
  text-decoration:none;
  padding:8px;
}

/* CONTENT */
.container {
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:48px;
  letter-spacing:3px;
}

p {
  opacity:0.7;
}

/* MAP */
.map {
  width:80%;
  max-width:600px;
  height:300px;
  margin-top:30px;
}

iframe {
  width:100%;
  height:100%;
  border:0;
  border-radius:12px;
}

</style>
</head>

<body>

<div class="menu" onclick="this.classList.toggle('open')">
  <div class="hamburger">
    <span></span><span></span><span></span>
  </div>
  <div class="menu-content">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="index.html#rsvp">RSVP</a>
  </div>
</div>

<div class="container">
  <h1>Location</h1>

  <p>Monastero Castel d'Alfiolo</p>
  <p>Gubbio</p>

  <div class="map">
    <iframe src="https://www.google.com/maps?q=Monastero%20Castel%20d%27Alfiolo%20Gubbio&output=embed"></iframe>
  </div>

  <p style="margin-top:20px;">
    Indicazioni: uscita Fossato di Vico → seguire per Gubbio → Castel d'Alfiolo
  </p>
</div>

<script>
/* ✅ FADE IN */
window.onload = () => {
  document.body.classList.add('loaded');
};

/* ✅ FADE OUT (same as homepage) */
const links = document.querySelectorAll('a[href]');
links.forEach(link => {
  link.addEventListener('click', function(e) {
    if (this.getAttribute('href').includes('#')) return;
    e.preventDefault();
    document.body.classList.remove('loaded');
    setTimeout(() => {
      window.location = this.getAttribute('href');
    }, 600);
  });
});
</script>

</body>
</html>
``
