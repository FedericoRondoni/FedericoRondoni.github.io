<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location — Elisa e Federico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page">

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <button class="burger" id="burger" aria-label="Apri menu" type="button">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>

      <div class="header-title">Elisa e Federico</div>
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="it">IT</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>

      <nav class="menu" id="menu" aria-label="Navigazione">
        <a href="index.html">Home</a>
        <a href="location.html">Location</a>
        <a href="rsvp.html">RSVP</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title" id="page-title">Location</h1>
      <div class="subtitle" id="subtitle">
        Abbazia Castel d'Alfiolo<br>
        Gubbio
      </div>

      <div class="map">
        <iframe
          src="https://www.google.com/maps?q=Abbazia%20Castel%20d%27Alfiolo%20Gubbio&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>

      <div class="location-details" id="location-details">
        <p>Indicazioni: da Umbertide seguire per Gubbio, poi per Castel d'Alfiolo.</p>
      </div>
    </div>
  </main>

  <script>
    // Language translations
    const translations = {
      it: {
        title: "Location",
        subtitle: "Abbazia Castel d'Alfiolo<br>Gubbio",
        details: "Indicazioni: da Umbertide seguire per Gubbio, poi per Castel d'Alfiolo.",
        home: "Home",
        location: "Location",
        rsvp: "RSVP"
      },
      en: {
        title: "Location",
        subtitle: "Abbazia Castel d'Alfiolo<br>Gubbio",
        details: "Directions: from Umbertide follow signs to Gubbio, then to Castel d'Alfiolo.",
        home: "Home",
        location: "Location",
        rsvp: "RSVP"
      }
    };

    // Detect user language preference
    function detectLanguage() {
      // Check localStorage first
      const savedLang = localStorage.getItem('preferredLang');
      if (savedLang) return savedLang;

      // Check browser language
      const browserLang = navigator.language || navigator.userLanguage;
      if (browserLang.startsWith('it')) return 'it';
      return 'en';
    }

    // Apply language
    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      localStorage.setItem('preferredLang', lang);

      const t = translations[lang];
      document.getElementById('page-title').textContent = t.title;
      document.getElementById('subtitle').innerHTML = t.subtitle;
      document.getElementById('location-details').innerHTML = `<p>${t.details}</p>`;

      // Update menu links
      const menuLinks = document.querySelectorAll('.menu a');
      if (menuLinks.length >= 3) {
        menuLinks[0].textContent = t.home;
        menuLinks[1].textContent = t.location;
        menuLinks[2].textContent = t.rsvp;
      }

      // Update active language button
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    // Initialize
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      const lang = detectLanguage();
      applyLanguage(lang);
    });

    // Language switcher
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyLanguage(btn.dataset.lang);
      });
    });

    const burger = document.getElementById('burger');
    const menu = document.getElementById('menu');
    let isMenuOpen = false;

    function toggleMenu() {
      isMenuOpen = !isMenuOpen;
      menu.classList.toggle('open');
      burger.classList.toggle('open');
      document.body.classList.toggle('menu-open');
    }

    function closeMenu() {
      isMenuOpen = false;
      menu.classList.remove('open');
      burger.classList.remove('open');
      document.body.classList.remove('menu-open');
    }

    burger.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleMenu();
    });

    document.addEventListener('click', (e) => {
      if (isMenuOpen && !menu.contains(e.target) && !burger.contains(e.target)) {
        closeMenu();
      }
    });

    document.querySelectorAll('.menu a').forEach(link => {
      link.addEventListener('click', () => {
        closeMenu();
      });
    });

    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');
        if (href && href.startsWith('#')) return;
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });
  </script>

</body>
</html>
