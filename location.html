<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location — Elisa e Federico</title>
  styles.css
</head>
<body>

  <div class="menu" id="menu">
    <div class="hamburger" id="hamburger" role="button" tabindex="0" aria-label="Apri menu">
      <span></span><span></span><span></span>
    </div>
    <div class="menu-content">
      index.htmlHome</a>
      location.htmlLocation</a>
      index.html#rsvpRSVP</a>
    </div>
  </div>

  <div class="container">
    <h1 class="page-title">Location</h1>
    <div class="subtitle" style="margin-bottom: 10px;">
      Abbazia Castel d'Alfiolo<br>
      Gubbio
    </div>

    <div class="map">
      https://www.google.com/maps?q=Abbazia%20Castel%20d%27Alfiolo%20Gubbio&output=embed
      </iframe>
    </div>

    <p style="opacity:.7; margin-top:22px; max-width: 760px; line-height: 1.6;">
      Indicazioni: uscita Fossato di Vico → seguire per Gubbio → Castel d'Alfiolo.
    </p>
  </div>

  <script>
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
    });

    // Menu toggle
    const menu = document.getElementById('menu');
    const hamburger = document.getElementById('hamburger');

    function toggleMenu(){ menu.classList.toggle('open'); }

    hamburger.addEventListener('click', toggleMenu);
    hamburger.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') toggleMenu();
    });

    document.querySelectorAll('.menu-content a').forEach(a => {
      a.addEventListener('click', () => menu.classList.remove('open'));
    });

    // Page transitions
    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');
        if (href && href.startsWith('#')) return;
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });
  </script>

</body>
</html>
