<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location — Elisa e Federico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- MENU -->
  <div class="menu" id="menu">
    <div class="hamburger" id="hamburger" aria-label="Apri menu" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
    <div class="menu-content" id="menuContent">
      <a href="index.html">Home</a>
      <a href="location.html">Location</a>
      <a href="index.html#rsvp">RSVP</a>
    </div>
  </div>

  <div class="container">
    <h1 class="page-title">Location</h1>
    <div class="subtitle" style="margin-bottom: 10px;">
      Abbazia Castel d'Alfiolo<br/>
      Gubbio
    </div>

    <div class="map">
      <iframe
        title="Mappa Abbazia Castel d'Alfiolo"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        src="https://www.google.com/maps?q=Abbazia%20Castel%20d%27Alfiolo%20Gubbio&output=embed">
      </iframe>
    </div>

    <p style="opacity:.7; margin-top:22px; max-width: 760px; line-height: 1.6;">
      Indicazioni: uscita Fossato di Vico → seguire per Gubbio → Castel d'Alfiolo.
      (Se vuoi, aggiungiamo anche un bottone “Apri su Google Maps” e una sezione parcheggio.)
    </p>
  </div>

  <script>
    // Fade-in on load
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
    });

    // Hamburger toggle
    const menu = document.getElementById('menu');
    const hamburger = document.getElementById('hamburger');

    function toggleMenu(){
      menu.classList.toggle('open');
    }

    hamburger.addEventListener('click', toggleMenu);
    hamburger.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') toggleMenu();
    });

    document.querySelectorAll('.menu-content a').forEach(a => {
      a.addEventListener('click', () => menu.classList.remove('open'));
    });

    // Smooth transitions between pages (fade-out)
    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');

        // Only skip fade if link is in-page anchor (location page doesn't have # anchors anyway)
        if (href && href.startsWith('#')) return;

        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });
  </script>

</body>
</html>
