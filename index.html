<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elisa e Federico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- MENU -->
  <div class="menu" id="menu">
    <div class="hamburger" id="hamburger" aria-label="Apri menu" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
    <div class="menu-content">
      <a href="index.html">Home</a>
      <a href="location.html">Location</a>
      <a href="#rsvp">RSVP</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero" id="hero">
    <h1>Elisa e Federico</h1>
    <div class="subtitle">
      2 gennaio 2026<br/>
      Abbazia Castel d'Alfiolo — Gubbio
    </div>

    <div class="wrapper">
      <div class="solar-system" id="solarSystem" aria-label="Sistema solare stilizzato">
        <div class="sun" id="sun"></div>

        <div class="orbit mercurio" data-name="Mercurio"><div class="planet mercurio"></div></div>
        <div class="orbit venere" data-name="Venere"><div class="planet venere"></div></div>
        <div class="orbit terra" data-name="Terra"><div class="planet terra"></div></div>
        <div class="orbit marte" data-name="Marte"><div class="planet marte"></div></div>
        <div class="orbit giove" data-name="Giove"><div class="planet giove"></div></div>
        <div class="orbit saturno" data-name="Saturno"><div class="planet saturno"></div></div>
        <div class="orbit urano" data-name="Urano"><div class="planet urano"></div></div>
        <div class="orbit nettuno" data-name="Nettuno"><div class="planet nettuno"></div></div>
        <div class="orbit plutone" data-name="Plutone"><div class="planet plutone"></div></div>

        <div class="planet-label" id="planetLabel" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <!-- RSVP -->
  <section id="rsvp">
    <h2>Conferma la tua presenza</h2>
  </section>

  <script>
    // ===== Fade-in on load
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      positionGlowUnderSun();
    });

    // ===== Hamburger toggle
    const menu = document.getElementById('menu');
    const hamburger = document.getElementById('hamburger');

    function toggleMenu(){ menu.classList.toggle('open'); }
    hamburger.addEventListener('click', toggleMenu);
    hamburger.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') toggleMenu();
    });
    document.querySelectorAll('.menu-content a').forEach(a => {
      a.addEventListener('click', () => menu.classList.remove('open'));
    });

    // ===== Smooth transitions between pages (fade-out)
    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');
        if (href && href.startsWith('#')) return; // no fade for in-page anchor
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });

    // ===== 1) Position the gradient glow exactly under the sun
    function positionGlowUnderSun(){
      const hero = document.getElementById('hero');
      const sun  = document.getElementById('sun');
      if(!hero || !sun) return;

      const heroRect = hero.getBoundingClientRect();
      const sunRect  = sun.getBoundingClientRect();

      // center of sun relative to hero
      const x = (sunRect.left + sunRect.width/2) - heroRect.left;
      const y = (sunRect.top  + sunRect.height/2) - heroRect.top;

      hero.style.setProperty('--glow-x', `${x}px`);
      hero.style.setProperty('--glow-y', `${y}px`);
    }

    window.addEventListener('resize', positionGlowUnderSun);

    // ===== 3) Planet names on desktop + mobile (pointer + touch)
    const label  = document.getElementById('planetLabel');
    const orbits = Array.from(document.querySelectorAll('.orbit'));

    function showLabel(text){
      label.textContent = text;
      label.style.opacity = '0.85';
    }
    function hideLabel(){
      label.style.opacity = '0';
      // optional: clear text after fade
      setTimeout(() => { if(label.style.opacity === '0') label.textContent = ''; }, 200);
    }

    // Desktop hover
    orbits.forEach(orbit => {
      orbit.addEventListener('pointerenter', () => showLabel(orbit.dataset.name));
      orbit.addEventListener('pointerleave', hideLabel);

      // Mobile / touch: show on touch, hide when finger leaves
      orbit.addEventListener('pointerdown', (e) => {
        // capture pointer so we reliably get pointerup/cancel
        orbit.setPointerCapture?.(e.pointerId);
        showLabel(orbit.dataset.name);
      });
      orbit.addEventListener('pointerup', hideLabel);
      orbit.addEventListener('pointercancel', hideLabel);
    });

    // Tap anywhere else = hide label
    document.addEventListener('pointerdown', (e) => {
      const isOrbit = e.target.classList && e.target.classList.contains('orbit');
      if(!isOrbit) hideLabel();
    });
  </script>

</body>
</html>
