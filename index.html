<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <button id="burger" class="burger">
    <span></span><span></span><span></span>
  </button>

  <nav id="menu" class="menu">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="rsvp.html">RSVP</a>
  </nav>
</header>

<main>

<section class="hero">
  <h1>Elisa e Federico</h1>
  <div class="subtitle">
    2 gennaio 2027<br>
    Abbazia Castel d'Alfiolo — Gubbio
  </div>

  <div class="solar-wrap">

    <svg viewBox="0 0 500 500" class="solar">

      <!-- filtro matita -->
      <defs>
        <filter id="pencil">
          <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/>
          <feDisplacementMap in="SourceGraphic" scale="1.5"/>
        </filter>
      </defs>

      <!-- sole -->
      <circle cx="250" cy="250" r="5" class="sun"/>

      <!-- ORBITE HAND DRAWN REALI -->
      <g class="orbit" data-name="Mercurio">
        <path d="M250,212 C270,210 292,225 290,250 C288,280 270,295 245,292 C215,288 210,260 215,235 C220,220 235,214 250,212 Z"/>
      </g>

      <g class="orbit" data-name="Venere">
        <path d="M250,185 C300,180 340,215 338,255 C334,310 295,330 240,325 C190,320 160,280 170,230 C180,195 210,187 250,185 Z"/>
      </g>

      <g class="orbit" data-name="Terra">
        <path d="M250,160 C330,150 385,200 380,260 C372,340 310,370 230,360 C160,350 120,300 135,230 C150,175 210,165 250,160 Z"/>
      </g>

      <!-- pianeti -->
      <circle class="planet" id="p1" r="2"/>
      <circle class="planet" id="p2" r="3"/>
      <circle class="planet" id="p3" r="4"/>

    </svg>

    <div id="label" class="label"></div>

  </div>
</section>

<section>
  <h2>Conferma la tua presenza</h2>
  <a href="rsvp.html" class="btn">RSVP</a>
</section>

</main>

<script>
/* menu */
const burger = document.getElementById('burger');
const menu = document.getElementById('menu');
burger.onclick = ()=>menu.classList.toggle('open');

/* label */
const label = document.getElementById('label');
document.querySelectorAll('.orbit').forEach(o=>{
  o.addEventListener('pointerenter',()=>{
    label.textContent = o.dataset.name;
    label.style.opacity = 1;
  });
});
document.addEventListener('pointermove',(e)=>{
  if(!e.target.closest('.orbit')){
    label.style.opacity=0;
  }
});

/* animazione NON circolare */
const paths = [...document.querySelectorAll('.orbit path')];

const planets = [
  {id:"p1", path:paths[0], speed:0.0004},
  {id:"p2", path:paths[1], speed:0.00025},
  {id:"p3", path:paths[2], speed:0.00015}
];

function animate(){
  const t = performance.now();

  planets.forEach(p=>{
    const length = p.path.getTotalLength();
    const pos = (t * p.speed * length) % length;
    const point = p.path.getPointAtLength(pos);

    const el = document.getElementById(p.id);
    el.setAttribute("cx",point.x);
    el.setAttribute("cy",point.y);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
