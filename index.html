<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>

<!-- FONTS -->
https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap

<style>
body {
  margin:0;
  font-family:'Work Sans', sans-serif;
  color:white;
  background: radial-gradient(circle at center, #1a2f6b 0%, #020611 80%);
  opacity:0;
  transition: opacity 0.8s ease;
}

body.loaded {
  opacity:1;
}

/* MENU */
.menu {
  position:fixed;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
}
.hamburger span {
  display:block;
  width:30px;
  height:3px;
  background:white;
  margin:6px auto;
  border-radius:4px;
}
.menu-content {
  display:none;
  background:rgba(0,0,0,0.85);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
.menu.open .menu-content {display:block;}
.menu-content a {
  display:block;
  color:white;
  text-decoration:none;
  padding:8px;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:48px;
  letter-spacing:4px;
  margin-bottom:10px;
}

.subtitle {
  font-size:16px;
  opacity:0.7;
  margin-bottom:40px;
}

/* SOLAR SYSTEM */
.wrapper {
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.solar-system {
  position:relative;
  width:60vmin;
  height:60vmin;
}

.sun {
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px rgba(255,255,255,0.7);
}

.orbit {
  position:absolute;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:50%;
  top:50%; left:50%;
}

.planet {
  position:absolute;
  top:50%; left:100%;
  transform:translate(-50%,-50%);
  background:white;
  border-radius:50%;
}

/* ORBITS */
.orbit.mercurio {width:10%;height:10%;animation:spin 6s linear infinite;}
.orbit.venere {width:15%;height:15%;animation:spin 10s linear infinite;}
.orbit.terra {width:20%;height:20%;animation:spin 14s linear infinite;}
.orbit.marte {width:25%;height:25%;animation:spin 18s linear infinite;}
.orbit.giove {width:35%;height:35%;animation:spin 24s linear infinite;}
.orbit.saturno {width:45%;height:45%;animation:spin 30s linear infinite;}
.orbit.urano {width:55%;height:55%;animation:spin 36s linear infinite;}
.orbit.nettuno {width:65%;height:65%;animation:spin 42s linear infinite;}
.orbit.plutone {width:75%;height:75%;animation:spin 50s linear infinite;}

@keyframes spin {
  from {transform:translate(-50%,-50%) rotate(0deg);} 
  to {transform:translate(-50%,-50%) rotate(360deg);} 
}

/* PLANETS */
.mercurio{width:2px;height:2px;}
.venere{width:3px;height:3px;}
.terra{width:4px;height:4px;}
.marte{width:3px;height:3px;}
.giove{width:18px;height:18px;}
.saturno{width:14px;height:14px;}
.urano{width:10px;height:10px;}
.nettuno{width:10px;height:10px;}
.plutone{width:2px;height:2px;}

/* LABEL */
.planet-label {
  position:absolute;
  top:50%;
  right:-120px;
  transform:translateY(-50%);
  font-family:'Playfair Display', serif;
  font-size:20px;
  opacity:0.8;
  letter-spacing:1px;
  min-width:120px;
  text-align:left;
  transition:opacity 0.3s ease;
}

section {
  padding:100px 20px;
}

h2 {
  font-family:'Playfair Display', serif;
  font-size:32px;
  margin-bottom:30px;
}

/* RSVP */
form input, form button {
  padding:14px;
  margin:12px;
  border:none;
  border-radius:6px;
}
form input { width:260px; }
form button {
  background:white;
  color:black;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="menu" onclick="this.classList.toggle('open')">
  <div class="hamburger">
    <span></span><span></span><span></span>
  </div>
  <div class="menu-content">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="#rsvp">RSVP</a>
  </div>
</div>

<div class="hero">
  <h1>Elisa e Federico</h1>
  <div class="subtitle">2 gennaio 2026<br>Monastero Castel d'Alfiolo — Gubbio</div>

  <div class="wrapper">

    <div class="solar-system">
      <div class="sun"></div>

      <div class="orbit mercurio"><div class="planet mercurio" onmouseover="setLabel('Mercurio')" onmouseout="clearLabel()"></div></div>
      <div class="orbit venere"><div class="planet venere" onmouseover="setLabel('Venere')" onmouseout="clearLabel()"></div></div>
      <div class="orbit terra"><div class="planet terra" onmouseover="setLabel('Terra')" onmouseout="clearLabel()"></div></div>
      <div class="orbit marte"><div class="planet marte" onmouseover="setLabel('Marte')" onmouseout="clearLabel()"></div></div>
      <div class="orbit giove"><div class="planet giove" onmouseover="setLabel('Giove')" onmouseout="clearLabel()"></div></div>
      <div class="orbit saturno"><div class="planet saturno" onmouseover="setLabel('Saturno')" onmouseout="clearLabel()"></div></div>
      <div class="orbit urano"><div class="planet urano" onmouseover="setLabel('Urano')" onmouseout="clearLabel()"></div></div>
      <div class="orbit nettuno"><div class="planet nettuno" onmouseover="setLabel('Nettuno')" onmouseout="clearLabel()"></div></div>
      <div class="orbit plutone"><div class="planet plutone" onmouseover="setLabel('Plutone')" onmouseout="clearLabel()"></div></div>
    </div>

    <div class="planet-label" id="planetLabel"></div>

  </div>
</div>

<section id="rsvp">
  <h2>Conferma la tua presenza</h2>
  <form>
    <input type="text" placeholder="Nome e Cognome" required><br>
    <input type="email" placeholder="Email" required><br>
    <button type="submit">Invia</button>
  </form>
</section>

<script>
// Fade in on load
window.onload = () => {
  document.body.classList.add('loaded');
};

// Fade transition between pages
const links = document.querySelectorAll('a[href]');
links.forEach(link => {
  link.addEventListener('click', function(e) {
    if (this.getAttribute('href').includes('#')) return;
    e.preventDefault();
    document.body.classList.remove('loaded');
    setTimeout(() => {
      window.location = this.getAttribute('href');
    }, 600);
  });
});

function setLabel(name) {
  const label = document.getElementById('planetLabel');
  label.innerText = name;
  label.style.opacity = 0.8;
}

function clearLabel() {
  const label = document.getElementById('planetLabel');
  label.style.opacity = 0;
}
</script>

</body>
</html>
