<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <button id="burger" class="burger">
    <span></span><span></span><span></span>
  </button>

  <nav id="menu" class="menu">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="rsvp.html">RSVP</a>
  </nav>
</header>

<main>

<section class="hero">

  <div class="title">Elisa e Federico</div>
  <div class="date">2 gennaio 2027</div>

  <div class="cta">
    <div class="cta-label">Conferma la tua presenza</div>
    <a href="rsvp.html" class="btn">RSVP</a>
  </div>

  <div class="solar-wrap">

    <svg viewBox="-120 -120 740 740" class="solar">

      <!-- sole -->
      <circle cx="250" cy="250" r="4" class="sun"/>

      <!-- ORBITE con HITBOX LARGA -->
      <!-- ogni orbita ha: 1 linea visiva + 1 linea invisibile larga -->

      <!-- Mercurio -->
      <g class="orbit" data-name="Mercurio">
        <ellipse cx="250" cy="250" rx="40" ry="41" class="stroke"/>
        <ellipse cx="250" cy="250" rx="40" ry="41" class="hit"/>
      </g>

      <!-- Venere -->
      <g class="orbit" data-name="Venere">
        <ellipse cx="250" cy="250" rx="65" ry="63" class="stroke"/>
        <ellipse cx="250" cy="250" rx="65" ry="63" class="hit"/>
      </g>

      <!-- Terra -->
      <g class="orbit" data-name="Terra">
        <ellipse cx="250" cy="250" rx="90" ry="92" class="stroke"/>
        <ellipse cx="250" cy="250" rx="90" ry="92" class="hit"/>
      </g>

      <!-- Marte -->
      <g class="orbit" data-name="Marte">
        <ellipse cx="250" cy="250" rx="120" ry="118" class="stroke"/>
        <ellipse cx="250" cy="250" rx="120" ry="118" class="hit"/>
      </g>

      <!-- Giove -->
      <g class="orbit" data-name="Giove">
        <ellipse cx="250" cy="250" rx="170" ry="175" class="stroke"/>
        <ellipse cx="250" cy="250" rx="170" ry="175" class="hit"/>
      </g>

      <!-- Saturno -->
      <g class="orbit" data-name="Saturno">
        <ellipse cx="250" cy="250" rx="210" ry="205" class="stroke"/>
        <ellipse cx="250" cy="250" rx="210" ry="205" class="hit"/>
      </g>

      <!-- Urano -->
      <g class="orbit" data-name="Urano">
        <ellipse cx="250" cy="250" rx="250" ry="255" class="stroke"/>
        <ellipse cx="250" cy="250" rx="250" ry="255" class="hit"/>
      </g>

      <!-- Nettuno -->
      <g class="orbit" data-name="Nettuno">
        <ellipse cx="250" cy="250" rx="290" ry="285" class="stroke"/>
        <ellipse cx="250" cy="250" rx="290" ry="285" class="hit"/>
      </g>

      <!-- ✅ PLUTONE RIPRISTINATO -->
      <g class="orbit" data-name="Plutone">
        <ellipse cx="250" cy="250" rx="330" ry="325" class="stroke"/>
        <ellipse cx="250" cy="250" rx="330" ry="325" class="hit"/>
      </g>

      <!-- pianeti -->
      <circle id="p1" r="2" class="planet"/>
      <circle id="p2" r="3" class="planet"/>
      <circle id="p3" r="4" class="planet"/>
      <circle id="p4" r="3" class="planet"/>
      <circle id="p5" r="8" class="planet"/>
      <circle id="p6" r="7" class="planet"/>
      <circle id="p7" r="6" class="planet"/>
      <circle id="p8" r="6" class="planet"/>
      <circle id="p9" r="2" class="planet"/>

    </svg>

    <div id="label" class="label"></div>

  </div>
</section>

</main>

<script>
/* menu */
const burger = document.getElementById('burger');
const menu = document.getElementById('menu');

burger.onclick = () => {
  burger.classList.toggle('open');
  menu.classList.toggle('open');
};

document.addEventListener('click', e=>{
  if(!e.target.closest('.burger') && !e.target.closest('.menu')){
    menu.classList.remove('open');
    burger.classList.remove('open');
  }
});

/* ✅ HOVER STABILE (hitbox large) */
const label = document.getElementById('label');

document.querySelectorAll('.orbit').forEach(o=>{
  o.addEventListener('pointerenter',()=>{
    label.textContent = o.dataset.name;
    label.style.opacity = 1;
  });
  o.addEventListener('pointerleave',()=>label.style.opacity=0);
});

/* pianeti (con plutone) */
const cfg = [
  {id:"p1", rx:40, ry:41, s:0.00012},
  {id:"p2", rx:65, ry:63, s:0.0001},
  {id:"p3", rx:90, ry:92, s:0.00008},
  {id:"p4", rx:120, ry:118, s:0.00006},
  {id:"p5", rx:170, ry:175, s:0.00004},
  {id:"p6", rx:210, ry:205, s:0.000035},
  {id:"p7", rx:250, ry:255, s:0.00003},
  {id:"p8", rx:290, ry:285, s:0.000025},
  {id:"p9", rx:330, ry:325, s:0.00002}
];

function animate(){
  const t = performance.now();

  cfg.forEach(p=>{
    const a = t * p.s;
    const x = 250 + Math.cos(a)*p.rx;
    const y = 250 + Math.sin(a)*p.ry;

    const el = document.getElementById(p.id);
    el.setAttribute("cx",x);
    el.setAttribute("cy",y);
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
