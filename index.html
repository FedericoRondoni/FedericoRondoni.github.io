<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <button id="burger" class="burger" aria-label="Apri menu">
    <span class="burger-line"></span>
    <span class="burger-line"></span>
    <span class="burger-line"></span>
  </button>

  <nav id="menu" class="menu">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="rsvp.html">RSVP</a>
  </nav>
</header>

<main>
<section class="hero">
  <div class="title">Elisa e Federico</div>
  <div class="date">2 gennaio 2027</div>
  <div class="cta-label">Conferma la tua presenza</div>
  <a href="rsvp.html" class="btn">RSVP</a>

  <div class="solar-wrap">
    <svg viewBox="-120 -120 740 740" class="solar" id="solar">
      <circle cx="250" cy="250" r="4" class="sun"/>
      
      <!-- ORBITE (ellissi con effetto "disegnato a mano") -->
      <g class="orbit" data-r="40" data-name="Mercurio">
        <ellipse cx="250" cy="250" rx="40" ry="40" class="line a" />
      </g>
      <g class="orbit" data-r="65" data-name="Venere">
        <ellipse cx="250" cy="250" rx="65" ry="65" class="line a" />
      </g>
      <g class="orbit" data-r="90" data-name="Terra">
        <ellipse cx="250" cy="250" rx="90" ry="90" class="line a" />
      </g>
      <g class="orbit" data-r="120" data-name="Marte">
        <ellipse cx="250" cy="250" rx="120" ry="120" class="line a" />
      </g>
      <g class="orbit" data-r="170" data-name="Giove">
        <ellipse cx="250" cy="250" rx="170" ry="170" class="line a" />
      </g>
      <g class="orbit" data-r="210" data-name="Saturno">
        <ellipse cx="250" cy="250" rx="210" ry="210" class="line a" />
      </g>
      <g class="orbit" data-r="250" data-name="Urano">
        <ellipse cx="250" cy="250" rx="250" ry="250" class="line a" />
      </g>
      <g class="orbit" data-r="290" data-name="Nettuno">
        <ellipse cx="250" cy="250" rx="290" ry="290" class="line a" />
      </g>
      <g class="orbit" data-r="330" data-name="Plutone">
        <ellipse cx="250" cy="250" rx="330" ry="330" class="line a" />
      </g>

      <!-- PIANETI (posizionati all'avvio) -->
      <circle id="p1" cx="290" cy="250" r="2"/>
      <circle id="p2" cx="315" cy="250" r="3"/>
      <circle id="p3" cx="340" cy="250" r="4"/>
      <circle id="p4" cx="370" cy="250" r="3"/>
      <circle id="p5" cx="420" cy="250" r="8"/>
      <circle id="p6" cx="460" cy="250" r="7"/>
      <circle id="p7" cx="500" cy="250" r="6"/>
      <circle id="p8" cx="540" cy="250" r="6"/>
      <circle id="p9" cx="580" cy="250" r="2"/>
    </svg>

    <div id="label" class="label"></div>
  </div>
</section>
</main>

<script>
const label = document.getElementById('label');
const burger = document.getElementById('burger');
const menu = document.getElementById('menu');

/* HOVER SU ORBITE E PIANETI */
document.addEventListener('pointermove', e => {
  const svg = document.getElementById('solar');
  const rect = svg.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const cx = 250;
  const cy = 250;
  const dx = x - cx;
  const dy = y - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  let found = null;
  document.querySelectorAll('.orbit').forEach(o => {
    const r = parseFloat(o.dataset.r);
    // Tollerenza ridotta a 5px per evitare sovrapposizioni
    if (Math.abs(dist - r) < 5) {
      found = o.dataset.name;
    }
  });

  if (!found) {
    const planets = [
      { id: 'p1', name: 'Mercurio' },
      { id: 'p2', name: 'Venere' },
      { id: 'p3', name: 'Terra' },
      { id: 'p4', name: 'Marte' },
      { id: 'p5', name: 'Giove' },
      { id: 'p6', name: 'Saturno' },
      { id: 'p7', name: 'Urano' },
      { id: 'p8', name: 'Nettuno' },
      { id: 'p9', name: 'Plutone' }
    ];

    planets.forEach(p => {
      const planetEl = document.getElementById(p.id);
      if (planetEl) {
        const px = parseFloat(planetEl.getAttribute('cx') || '0');
        const py = parseFloat(planetEl.getAttribute('cy') || '0');
        const planetDist = Math.sqrt((x - px) * (x - px) + (y - py) * (y - py));
        if (planetDist < 8) {
          found = p.name;
        }
      }
    });
  }

  if (found) {
    label.textContent = found;
    // Posiziona il label vicino al mouse
    label.style.left = `${e.clientX - rect.left + 15}px`;
    label.style.top = `${e.clientY - rect.top - 10}px`;
    label.style.opacity = 1;
  } else {
    label.style.opacity = 0;
  }
});

/* ANIMAZIONE PIANETI CON POSIZIONI RANDOMICHE */
const cfg = [
  {id:"p1", r:40, s:0.00012, offset: Math.random() * Math.PI * 2},
  {id:"p2", r:65, s:0.0001, offset: Math.random() * Math.PI * 2},
  {id:"p3", r:90, s:0.00008, offset: Math.random() * Math.PI * 2},
  {id:"p4", r:120, s:0.00006, offset: Math.random() * Math.PI * 2},
  {id:"p5", r:170, s:0.00004, offset: Math.random() * Math.PI * 2},
  {id:"p6", r:210, s:0.000035, offset: Math.random() * Math.PI * 2},
  {id:"p7", r:250, s:0.00003, offset: Math.random() * Math.PI * 2},
  {id:"p8", r:290, s:0.000025, offset: Math.random() * Math.PI * 2},
  {id:"p9", r:330, s:0.00002, offset: Math.random() * Math.PI * 2}
];

function animate() {
  const t = performance.now();
  cfg.forEach(p => {
    const a = t * p.s + p.offset;
    const x = 250 + Math.cos(a) * p.r;
    const y = 250 + Math.sin(a) * p.r;
    const el = document.getElementById(p.id);
    if (el) {
      el.setAttribute("cx", x);
      el.setAttribute("cy", y);
    }
  });
  requestAnimationFrame(animate);
}
animate();

/* LOADING */
window.addEventListener('load', function() {
  document.body.classList.add('loaded');
});

/* MENU BURGER */
let isMenuOpen = false;
function toggleMenu() {
  isMenuOpen = !isMenuOpen;
  menu.classList.toggle('open');
  burger.classList.toggle('open');
  document.body.classList.toggle('menu-open');
}
function closeMenu() {
  isMenuOpen = false;
  menu.classList.remove('open');
  burger.classList.remove('open');
  document.body.classList.remove('menu-open');
}
burger.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMenu();
});
document.addEventListener('click', (e) => {
  if (isMenuOpen && !menu.contains(e.target) && !burger.contains(e.target)) {
    closeMenu();
  }
});
document.querySelectorAll('.menu a').forEach(link => {
  link.addEventListener('click', () => {
    closeMenu();
  });
});
  window.addEventListener('load', function() {
  document.body.classList.add('loaded');
});
</script>

</body>
</html>
