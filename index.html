<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- POPUP BUSTA -->
<div id="envelope-popup" class="envelope-overlay envelope-hidden">
  <div class="envelope-container">
    <svg class="envelope-svg" viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">
      <g id="envelope-group" transform="translate(100,65) rotate(180) translate(-100,-65)">
        <!-- Corpo busta con angoli arrotondati -->
        <rect x="10" y="10" width="180" height="80" rx="4" ry="4" fill="#8B0000" stroke="#f5f0e6" stroke-width="1"/>
        
        <!-- Lembo: UN SOLO triangolo con punta leggermente stondata -->
        <path d="M15 90 L100 45 L185 90 Z" fill="#8B0000" stroke="#f5f0e6" stroke-width="1"/>
        
        <!-- Linea di chiusura lembo -->
        <line x1="100" y1="90" x2="100" y2="45" stroke="#f5f0e6" stroke-width="1"/>
      </g>
      
      <!-- Ombra sotto la busta (non ruotata) -->
      <ellipse id="envelope-shadow" cx="100" cy="150" rx="55" ry="6" fill="rgba(0,0,0,0.2)" filter="url(#blur)"/>
      
      <filter id="blur">
        <feGaussianBlur stdDeviation="3"/>
      </filter>
    </svg>
    <p class="envelope-text">Apri l'invito</p>
  </div>
</div>

<!-- INVITO POPUP (apre dopo la busta) -->
<div id="invitation-popup" class="invitation-overlay invitation-hidden">
  <div class="invitation-content">
    <p class="invitation-text">Ti invitiamo al nostro matrimonio</p>
    <p class="invitation-names">Elisa e Federico</p>
    <p class="invitation-date">2 gennaio 2027</p>
    <p class="invitation-location">Abbazia Castel d'Alfiolo - Gubbio</p>
    <button id="close-invitation" class="invitation-close">Entra nel sito</button>
  </div>
</div>

<header class="site-header">
  <button id="burger" class="burger" aria-label="Apri menu">
    <span class="burger-line"></span>
    <span class="burger-line"></span>
    <span class="burger-line"></span>
  </button>

  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <nav id="menu" class="menu">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="rsvp.html">RSVP</a>
  </nav>
</header>

<main>
<section class="hero">
  <div class="title">Elisa e Federico</div>
  <div class="date">2 gennaio 2027</div>
  <a href="rsvp.html" class="btn" id="cta-button">RSVP</a>

  <div class="solar-wrap">
    <svg viewBox="-120 -120 740 740" class="solar" id="solar">
      <circle cx="250" cy="250" r="4" class="sun"/>
      
      <!-- ORBITE -->
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="40" ry="40" class="line a" />
      </g>
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="65" ry="65" class="line a" />
      </g>
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="90" ry="90" class="line a" />
      </g>
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="120" ry="120" class="line a" />
      </g>
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="170" ry="170" class="line a" />
      </g>
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="210" ry="210" class="line a" />
      </g>
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="250" ry="250" class="line a" />
      </g>
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="290" ry="290" class="line a" />
      </g>
      <g class="orbit">
        <ellipse cx="250" cy="250" rx="330" ry="330" class="line a" />
      </g>

      <!-- PIANETI -->
      <circle id="p1" cx="290" cy="250" r="3" class="planet"/>
      <circle id="p2" cx="315" cy="250" r="4" class="planet"/>
      <circle id="p3" cx="340" cy="250" r="5" class="planet"/>
      <circle id="p4" cx="370" cy="250" r="4" class="planet"/>
      <circle id="p5" cx="420" cy="250" r="10" class="planet"/>
      <circle id="p6" cx="460" cy="250" r="9" class="planet"/>
      <circle id="p7" cx="500" cy="250" r="8" class="planet"/>
      <circle id="p8" cx="540" cy="250" r="8" class="planet"/>
      <circle id="p9" cx="580" cy="250" r="3" class="planet"/>
    </svg>
  </div>
</section>
</main>

<script>
const envelopePopup = document.getElementById('envelope-popup');
const burger = document.getElementById('burger');
const menu = document.getElementById('menu');

/* LANGUAGE TRANSLATIONS */
const translations = {
  it: {
    home: "Home",
    location: "Location",
    rsvp: "RSVP",
    cta: "Conferma la tua presenza",
    invitationText: "Ti invitiamo al nostro matrimonio",
    invitationNames: "Elisa e Federico",
    invitationDate: "2 gennaio 2027",
    invitationLocation: "Abbazia Castel d'Alfiolo - Gubbio",
    enterSite: "Entra nel sito"
  },
  en: {
    home: "Home",
    location: "Location",
    rsvp: "RSVP",
    cta: "Please confirm your attendance",
    invitationText: "We invite you to our wedding",
    invitationNames: "Elisa & Federico",
    invitationDate: "January 2nd, 2027",
    invitationLocation: "Abbazia Castel d'Alfiolo - Gubbio",
    enterSite: "Enter the website"
  }
};

/* LANGUAGE DETECTION */
function detectLanguage() {
  const savedLang = localStorage.getItem('preferredLang');
  if (savedLang) return savedLang;
  const browserLang = navigator.language || navigator.userLanguage;
  return browserLang.startsWith('it') ? 'it' : 'en';
}

function applyLanguage(lang) {
  document.documentElement.lang = lang;
  localStorage.setItem('preferredLang', lang);
  const t = translations[lang];
  
  // Update menu links
  const menuLinks = document.querySelectorAll('.menu a');
  if (menuLinks.length >= 3) {
    menuLinks[0].textContent = t.home;
    menuLinks[1].textContent = t.location;
    menuLinks[2].textContent = t.rsvp;
  }
  
  // Update CTA button
  const ctaBtn = document.getElementById('cta-button');
  if (ctaBtn) {
    ctaBtn.textContent = t.cta;
  }
  
  // Update invitation popup
  const invitationText = document.querySelector('.invitation-text');
  const invitationNames = document.querySelector('.invitation-names');
  const invitationDate = document.querySelector('.invitation-date');
  const invitationLocation = document.querySelector('.invitation-location');
  const closeInvitationBtn = document.getElementById('close-invitation');
  
  if (invitationText) invitationText.textContent = t.invitationText;
  if (invitationNames) invitationNames.textContent = t.invitationNames;
  if (invitationDate) invitationDate.textContent = t.invitationDate;
  if (invitationLocation) invitationLocation.textContent = t.invitationLocation;
  if (closeInvitationBtn) closeInvitationBtn.textContent = t.enterSite;
  
  // Update active language button
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
}

/* ENVELOPE POPUP - Mostra solo alla prima visita */
const invitationPopup = document.getElementById('invitation-popup');
const closeInvitation = document.getElementById('close-invitation');

function checkFirstVisit() {
  return localStorage.getItem('envelopeShown') !== 'true';
}

function markAsVisited() {
  localStorage.setItem('envelopeShown', 'true');
}

if (checkFirstVisit()) {
  envelopePopup.classList.remove('envelope-hidden');
  
  // Chiudi busta e mostra invito
  envelopePopup.addEventListener('click', () => {
    envelopePopup.classList.add('envelope-hidden');
    invitationPopup.classList.remove('invitation-hidden');
  });
  
  // Chiudi invito e entra nel sito
  closeInvitation.addEventListener('click', () => {
    invitationPopup.classList.add('invitation-hidden');
    markAsVisited();
    document.body.classList.add('loaded');
  });
} else {
  envelopePopup.classList.add('envelope-hidden');
  invitationPopup.classList.add('invitation-hidden');
  document.body.classList.add('loaded');
}

/* INITIALIZE */
window.addEventListener('load', () => {
  const lang = detectLanguage();
  applyLanguage(lang);
});

/* LANGUAGE SWITCHER */
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    applyLanguage(btn.dataset.lang);
  });
});

/* ANIMAZIONE PIANETI CON POSIZIONI RANDOMICHE */
const cfg = [
  {id:"p1", r:40, s:0.00012, offset: Math.random() * Math.PI * 2},
  {id:"p2", r:65, s:0.0001, offset: Math.random() * Math.PI * 2},
  {id:"p3", r:90, s:0.00008, offset: Math.random() * Math.PI * 2},
  {id:"p4", r:120, s:0.00006, offset: Math.random() * Math.PI * 2},
  {id:"p5", r:170, s:0.00004, offset: Math.random() * Math.PI * 2},
  {id:"p6", r:210, s:0.000035, offset: Math.random() * Math.PI * 2},
  {id:"p7", r:250, s:0.00003, offset: Math.random() * Math.PI * 2},
  {id:"p8", r:290, s:0.000025, offset: Math.random() * Math.PI * 2},
  {id:"p9", r:330, s:0.00002, offset: Math.random() * Math.PI * 2}
];

function animate() {
  const t = performance.now();
  cfg.forEach(p => {
    const a = t * p.s + p.offset;
    const x = 250 + Math.cos(a) * p.r;
    const y = 250 + Math.sin(a) * p.r;
    const el = document.getElementById(p.id);
    if (el) {
      el.setAttribute("cx", x);
      el.setAttribute("cy", y);
    }
  });
  requestAnimationFrame(animate);
}
animate();

/* MENU BURGER */
let isMenuOpen = false;
function toggleMenu() {
  isMenuOpen = !isMenuOpen;
  menu.classList.toggle('open');
  burger.classList.toggle('open');
  document.body.classList.toggle('menu-open');
}
function closeMenu() {
  isMenuOpen = false;
  menu.classList.remove('open');
  burger.classList.remove('open');
  document.body.classList.remove('menu-open');
}
burger.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMenu();
});
document.addEventListener('click', (e) => {
  if (isMenuOpen && !menu.contains(e.target) && !burger.contains(e.target)) {
    closeMenu();
  }
});
document.querySelectorAll('.menu a').forEach(link => {
  link.addEventListener('click', () => {
    closeMenu();
  });
});
  window.addEventListener('load', function() {
  document.body.classList.add('loaded');
});
</script>

</body>
</html>
