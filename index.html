      <!-- PIANETI -->

</main>

<script>
const label = document.getElementById('label');
const burger = document.getElementById('burger');
const menu = document.getElementById('menu');

/* HOVER SU ORBITE E PIANETI (corretto con path) */
document.addEventListener('pointermove', e => {
  const svg = document.getElementById('solar');
  const rect = svg.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // Controlla se il mouse è sopra un'orbita (path)
  let found = null;
  document.querySelectorAll('.orbit path').forEach(path => {
    const orbitGroup = path.closest('.orbit');
    if (!orbitGroup) return;
    
    // Usa SVG DOM per checkare se il punto (x,y) è dentro il path
    const point = svg.createSVGPoint();
    point.x = x;
    point.y = y;
    const isInPath = path.checkPointInStroke ? path.checkPointInStroke(point) : false;
    
    // Alternativa: calcola distanza dal centro e confronta con raggio
    const cx = 250;
    const cy = 250;
    const dx = x - cx;
    const dy = y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const r = parseFloat(orbitGroup.dataset.r);
    
    // Tollera un margine di 10px per l'hover
    if (Math.abs(dist - r) < 10) {
      found = orbitGroup.dataset.name;
    }
  });

  // Controlla anche se il mouse è vicino a un pianeta
  if (!found) {
    const planets = [
      { id: 'p1', name: 'Mercurio' },
      { id: 'p2', name: 'Venere' },
      { id: 'p3', name: 'Terra' },
      { id: 'p4', name: 'Marte' },
      { id: 'p5', name: 'Giove' },
      { id: 'p6', name: 'Saturno' },
      { id: 'p7', name: 'Urano' },
      { id: 'p8', name: 'Nettuno' },
      { id: 'p9', name: 'Plutone' }
    ];

    planets.forEach(p => {
      const planetEl = document.getElementById(p.id);
      if (planetEl) {
        const px = parseFloat(planetEl.getAttribute('cx') || '0');
        const py = parseFloat(planetEl.getAttribute('cy') || '0');
        const planetDist = Math.sqrt((x - px) * (x - px) + (y - py) * (y - py));
        if (planetDist < 8) {
          found = p.name;
        }
      }
    });
  }

  if (found) {
    label.textContent = found;
    label.style.opacity = 1;
  } else {
    label.style.opacity = 0;
  }
});

/* ANIMAZIONE PIANETI CON POSIZIONI RANDOMICHE INIZIALI */
const cfg = [
  {id:"p1", r:40, s:0.00012, offset: Math.random() * Math.PI * 2},
  {id:"p2", r:65, s:0.0001, offset: Math.random() * Math.PI * 2},
  {id:"p3", r:90, s:0.00008, offset: Math.random() * Math.PI * 2},
  {id:"p4", r:120, s:0.00006, offset: Math.random() * Math.PI * 2},
  {id:"p5", r:170, s:0.00004, offset: Math.random() * Math.PI * 2},
  {id:"p6", r:210, s:0.000035, offset: Math.random() * Math.PI * 2},
  {id:"p7", r:250, s:0.00003, offset: Math.random() * Math.PI * 2},
  {id:"p8", r:290, s:0.000025, offset: Math.random() * Math.PI * 2},
  {id:"p9", r:330, s:0.00002, offset: Math.random() * Math.PI * 2}
];

function animate() {
  const t = performance.now();

  cfg.forEach(p => {
    const a = t * p.s + p.offset;
    const x = 250 + Math.cos(a) * p.r;
    const y = 250 + Math.sin(a) * p.r;

    const el = document.getElementById(p.id);
    if (el) {
      el.setAttribute("cx", x);
      el.setAttribute("cy", y);
    }
  });

  requestAnimationFrame(animate);
}

// Avvia l'animazione
animate();

// Gestione menu burger
let isMenuOpen = false;

function toggleMenu() {
  isMenuOpen = !isMenuOpen;
  menu.classList.toggle('open');
  burger.classList.toggle('open');
  document.body.classList.toggle('menu-open');
}

function closeMenu() {
  isMenuOpen = false;
  menu.classList.remove('open');
  burger.classList.remove('open');
  document.body.classList.remove('menu-open');
}

burger.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMenu();
});

// Chiudi menu se clicco fuori
document.addEventListener('click', (e) => {
  if (isMenuOpen && !menu.contains(e.target) && !burger.contains(e.target)) {
    closeMenu();
  }
});

// Chiudi menu se clicco su un link
document.querySelectorAll('.menu a').forEach(link => {
  link.addEventListener('click', () => {
    closeMenu();
  });
});
</script>
