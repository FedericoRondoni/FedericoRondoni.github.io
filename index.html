<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <button id="burger" class="burger">
    <span></span><span></span><span></span>
  </button>

  <nav id="menu" class="menu">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="rsvp.html">RSVP</a>
  </nav>
</header>

<main>

<section class="hero">
  <h1>Elisa e Federico</h1>
  <div class="subtitle">
    <h3>2 gennaio 2027</h3>
  </div>

  <div class="solar-wrap">

    <svg viewBox="0 0 500 500" class="solar">

      <defs>
        <!-- MATITA + JITTER -->
        <filter id="pencil">
          <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" id="noise"/>
          <feDisplacementMap in="SourceGraphic" scale="0.8"/>
        </filter>
      </defs>

      <!-- sole -->
      <circle cx="250" cy="250" r="5" class="sun"/>

      <!-- ORBITE (quasi circolari + leggere variazioni) -->
      <g class="orbit" data-name="Mercurio">
        <ellipse cx="250" cy="250" rx="40" ry="41"/>
      </g>
      <g class="orbit" data-name="Venere">
        <ellipse cx="250" cy="250" rx="65" ry="63"/>
      </g>
      <g class="orbit" data-name="Terra">
        <ellipse cx="250" cy="250" rx="90" ry="92"/>
      </g>
      <g class="orbit" data-name="Marte">
        <ellipse cx="250" cy="250" rx="120" ry="118"/>
      </g>
      <g class="orbit" data-name="Giove">
        <ellipse cx="250" cy="250" rx="170" ry="175"/>
      </g>
      <g class="orbit" data-name="Saturno">
        <ellipse cx="250" cy="250" rx="210" ry="205"/>
      </g>
      <g class="orbit" data-name="Urano">
        <ellipse cx="250" cy="250" rx="250" ry="255"/>
      </g>
      <g class="orbit" data-name="Nettuno">
        <ellipse cx="250" cy="250" rx="280" ry="275"/>
      </g>
      <g class="orbit" data-name="Plutone">
        <ellipse cx="250" cy="250" rx="310" ry="305"/>
      </g>

      <!-- pianeti -->
      <circle id="p1" r="2.5" class="planet"/>
      <circle id="p2" r="3" class="planet"/>
      <circle id="p3" r="4" class="planet"/>
      <circle id="p4" r="3" class="planet"/>
      <circle id="p5" r="8" class="planet"/>
      <circle id="p6" r="7" class="planet"/>
      <circle id="p7" r="6" class="planet"/>
      <circle id="p8" r="6" class="planet"/>
      <circle id="p9" r="2" class="planet"/>

    </svg>

    <div id="label" class="label"></div>

  </div>
</section>

<section>
  <h2>Conferma la tua presenza</h2>
  <a href="rsvp.html" class="btn">RSVP</a>
</section>

</main>

<script>
/* menu */
document.getElementById('burger').onclick = () =>
  document.getElementById('menu').classList.toggle('open');

/* LABEL CLICK SU ORBITA */
const label = document.getElementById('label');
document.querySelectorAll('.orbit').forEach(o=>{
  o.addEventListener('click',()=>{
    label.textContent = o.dataset.name;
    label.style.opacity = 1;
  });
});

/* ANIMAZIONE PIÙ NATURALE (ELLITTICA + LENTA) */
const orbits = [
  {p:'p1', rx:40, ry:41, s:0.00015},
  {p:'p2', rx:65, ry:63, s:0.00012},
  {p:'p3', rx:90, ry:92, s:0.00010},
  {p:'p4', rx:120, ry:118, s:0.00008},
  {p:'p5', rx:170, ry:175, s:0.00005},
  {p:'p6', rx:210, ry:205, s:0.00004},
  {p:'p7', rx:250, ry:255, s:0.00003},
  {p:'p8', rx:280, ry:275, s:0.000025},
  {p:'p9', rx:310, ry:305, s:0.00002}
];

function animate(){
  const t = performance.now();

  orbits.forEach(o=>{
    const angle = t * o.s;
    const x = 250 + Math.cos(angle) * o.rx;
    const y = 250 + Math.sin(angle) * o.ry;

    const el = document.getElementById(o.p);
    el.setAttribute("cx", x);
    el.setAttribute("cy", y);
  });

  /* jitter dinamico */
  const noise = document.querySelector('#noise');
  noise.setAttribute('baseFrequency', 0.8 + Math.sin(t*0.002)*0.05);

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
