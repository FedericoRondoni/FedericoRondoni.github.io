<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elisa e Federico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- MENU -->
  <div class="menu" id="menu">
    <div class="hamburger" id="hamburger" aria-label="Apri menu" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
    <div class="menu-content" id="menuContent">
      <a href="index.html">Home</a>
      <a href="location.html">Location</a>
      <a href="#rsvp">RSVP</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Elisa e Federico</h1>
    <div class="subtitle">
      2 gennaio 2026<br/>
      Abbazia Castel d'Alfiolo — Gubbio
    </div>

    <div class="wrapper">
      <div class="solar-system" aria-label="Sistema solare stilizzato">

        <div class="sun"></div>

        <div class="orbit mercurio"><div class="planet mercurio"></div></div>
        <div class="orbit venere"><div class="planet venere"></div></div>
        <div class="orbit terra"><div class="planet terra"></div></div>
        <div class="orbit marte"><div class="planet marte"></div></div>
        <div class="orbit giove"><div class="planet giove"></div></div>
        <div class="orbit saturno"><div class="planet saturno"></div></div>
        <div class="orbit urano"><div class="planet urano"></div></div>
        <div class="orbit nettuno"><div class="planet nettuno"></div></div>
        <div class="orbit plutone"><div class="planet plutone"></div></div>

        <!-- single label box (fixed position) -->
        <div class="planet-label" aria-hidden="true"></div>

      </div>
    </div>
  </div>

  <!-- RSVP SECTION -->
  <section id="rsvp">
    <h2>Conferma la tua presenza</h2>
    <p style="opacity:.7; margin:0;">(Se vuoi, nella prossima iterazione colleghiamo l’RSVP a Google Sheets o email.)</p>
  </section>

  <script>
    // Fade-in on load
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
    });

    // Hamburger toggle
    const menu = document.getElementById('menu');
    const hamburger = document.getElementById('hamburger');

    function toggleMenu(){
      menu.classList.toggle('open');
    }

    hamburger.addEventListener('click', toggleMenu);
    hamburger.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') toggleMenu();
    });

    // Close menu when clicking a menu link
    document.querySelectorAll('.menu-content a').forEach(a => {
      a.addEventListener('click', () => menu.classList.remove('open'));
    });

    // Smooth transitions between pages (fade-out)
    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');

        // If it's an in-page anchor (#...), do not fade-out (keep smooth scroll)
        if (href && href.startsWith('#')) return;

        // Otherwise do fade-out then navigate
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });
  </script>

</body>
</html>
