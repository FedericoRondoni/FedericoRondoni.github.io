<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Elisa e Federico</h1>
<div class="subtitle">
  2 gennaio 2027<br>
  Abbazia Castel d'Alfiolo — Gubbio
</div>

<div class="solar-wrap">

<svg viewBox="0 0 500 500" class="solar">

  <!-- Sole -->
  <circle cx="250" cy="250" r="4" class="sun"/>

  <!-- ORBITE HAND-DRAWN (irregolari) -->
  <ellipse cx="250" cy="250" rx="30" ry="28" class="orbit" data-name="Mercurio"/>
  <ellipse cx="250" cy="250" rx="50" ry="52" class="orbit" data-name="Venere"/>
  <ellipse cx="250" cy="250" rx="70" ry="68" class="orbit" data-name="Terra"/>
  <ellipse cx="250" cy="250" rx="90" ry="94" class="orbit" data-name="Marte"/>
  <ellipse cx="250" cy="250" rx="130" ry="125" class="orbit" data-name="Giove"/>
  <ellipse cx="250" cy="250" rx="170" ry="180" class="orbit" data-name="Saturno"/>
  <ellipse cx="250" cy="250" rx="210" ry="200" class="orbit" data-name="Urano"/>
  <ellipse cx="250" cy="250" rx="240" ry="250" class="orbit" data-name="Nettuno"/>
  <ellipse cx="250" cy="250" rx="270" ry="265" class="orbit" data-name="Plutone"/>

  <!-- PIANETI (in scala e NON overlapping) -->
  <circle cx="280" cy="250" r="2" class="planet"/>
  <circle cx="300" cy="250" r="3" class="planet"/>
  <circle cx="320" cy="250" r="4" class="planet"/>
  <circle cx="340" cy="250" r="3" class="planet"/>
  <circle cx="380" cy="250" r="9" class="planet"/>
  <circle cx="420" cy="250" r="8" class="planet"/>
  <circle cx="460" cy="250" r="6" class="planet"/>
  <circle cx="485" cy="250" r="6" class="planet"/>
  <circle cx="510" cy="250" r="2" class="planet"/>

</svg>

<div id="label" class="label"></div>

</div>

<section>
  <h2>Conferma la tua presenza</h2>
  <a href="rsvp.html" class="btn">RSVP</a>
</section>

<script>
const label = document.getElementById('label');

document.querySelectorAll('.orbit').forEach(el=>{
  el.addEventListener('pointerenter',()=>{
    label.textContent = el.dataset.name;
    label.style.opacity = 1;
  });
  el.addEventListener('pointerleave',()=>{
    label.style.opacity = 0;
  });
});
</script>

</body>
</html>
