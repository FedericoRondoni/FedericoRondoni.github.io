<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="page">

<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <button class="burger" id="burger">
      <span></span><span></span><span></span>
    </button>

    <div class="header-title">Elisa e Federico</div>

    <nav class="nav-panel">
      <a href="index.html">Home</a>
      <a href="location.html">Location</a>
      <a href="rsvp.html">RSVP</a>
    </nav>
  </div>
</header>

<main>

<div class="hero">
  <h1>Elisa e Federico</h1>
  <div class="subtitle">
    2 gennaio 2027<br>
    Abbazia Castel d'Alfiolo — Gubbio
  </div>

  <div class="solar-system">
    <div class="sun"></div>

    <div class="orbit mercurio" data-name="Mercurio"><div class="planet mercurio"></div></div>
    <div class="orbit venere" data-name="Venere"><div class="planet venere"></div></div>
    <div class="orbit terra" data-name="Terra"><div class="planet terra"></div></div>
    <div class="orbit marte" data-name="Marte"><div class="planet marte"></div></div>
    <div class="orbit giove" data-name="Giove"><div class="planet giove"></div></div>
    <div class="orbit saturno" data-name="Saturno"><div class="planet saturno"></div></div>
    <div class="orbit urano" data-name="Urano"><div class="planet urano"></div></div>
    <div class="orbit nettuno" data-name="Nettuno"><div class="planet nettuno"></div></div>
    <div class="orbit plutone" data-name="Plutone"><div class="planet plutone"></div></div>

    <div class="planet-label" id="planetLabel"></div>
  </div>
</div>

<section>
  <h2>Conferma la tua presenza</h2>
  <a href="rsvp.html" class="rsvp-btn">RSVP</a>
</section>

</main>

<script>
window.addEventListener('load',()=>{
  document.body.classList.add('loaded');

  document.querySelectorAll('.orbit').forEach(o=>{
    const d=parseFloat(getComputedStyle(o).animationDuration);
    o.style.animationDelay=`-${Math.random()*d}s`;
  });
});

const header=document.getElementById('siteHeader');
window.addEventListener('scroll',()=>{
  header.classList.toggle('scrolled',window.scrollY>40);
});

document.getElementById('burger')
.addEventListener('click',()=>header.classList.toggle('open'));

/* label comportamento completo */
const label=document.getElementById('planetLabel');

/* desktop */
document.querySelectorAll('.orbit').forEach(o=>{
  o.addEventListener('pointerenter',()=>{
    label.textContent=o.dataset.name;
    label.style.opacity=.85;
  });
  o.addEventListener('pointerleave',()=>{
    label.style.opacity=0;
  });
});

/* mobile fix vero */
document.addEventListener('pointermove',(e)=>{
  const els=document.elementsFromPoint(e.clientX,e.clientY);
  const orbit=els.find(el=>el.classList?.contains('orbit'));
  if(orbit){
    label.textContent=orbit.dataset.name;
    label.style.opacity=.85;
  }
});
</script>

</body>
</html>
