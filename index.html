<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header" id="header">
  <button id="burger" class="burger">
    <span></span><span></span><span></span>
  </button>

  <nav class="menu" id="menu">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="rsvp.html">RSVP</a>
  </nav>
</header>

<main>

<section class="hero">
  <h1>Elisa e Federico</h1>
  <div class="subtitle">
    2 gennaio 2027<br>
    Abbazia Castel d'Alfiolo — Gubbio
  </div>

  <div class="solar-wrap">

    <svg viewBox="0 0 500 500" class="solar">

      <g id="system">

        <!-- sole -->
        <circle cx="250" cy="250" r="5" class="sun"/>

        <!-- orbite -->
        <g class="orbit" data-name="Mercurio"><ellipse cx="250" cy="250" rx="40" ry="38"/></g>
        <g class="orbit" data-name="Venere"><ellipse cx="250" cy="250" rx="65" ry="70"/></g>
        <g class="orbit" data-name="Terra"><ellipse cx="250" cy="250" rx="90" ry="85"/></g>
        <g class="orbit" data-name="Marte"><ellipse cx="250" cy="250" rx="120" ry="125"/></g>
        <g class="orbit" data-name="Giove"><ellipse cx="250" cy="250" rx="170" ry="160"/></g>
        <g class="orbit" data-name="Saturno"><ellipse cx="250" cy="250" rx="210" ry="225"/></g>
        <g class="orbit" data-name="Urano"><ellipse cx="250" cy="250" rx="250" ry="240"/></g>

        <!-- pianeti -->
        <circle class="planet" id="p1" r="2"/>
        <circle class="planet" id="p2" r="3"/>
        <circle class="planet" id="p3" r="4"/>
        <circle class="planet" id="p4" r="3"/>
        <circle class="planet" id="p5" r="9"/>
        <circle class="planet" id="p6" r="8"/>
        <circle class="planet" id="p7" r="6"/>

      </g>
    </svg>

    <div id="label" class="label"></div>

  </div>
</section>

<section>
  <h2>Conferma la tua presenza</h2>
  <a href="rsvp.html" class="btn">RSVP</a>
</section>

</main>

<script>
/* menu */
const burger = document.getElementById('burger');
const menu = document.getElementById('menu');
burger.onclick = () => menu.classList.toggle('open');

/* label */
const label = document.getElementById('label');

document.querySelectorAll('.orbit').forEach(o=>{
  o.addEventListener('pointerenter',()=>{
    label.textContent = o.dataset.name;
    label.style.opacity = 1;
  });
});

document.addEventListener('pointerleave',()=>{
  label.style.opacity = 0;
});

/* animazione pianeti reale */
const planets = [
  {el:'p1', r:40, speed:0.02},
  {el:'p2', r:65, speed:0.015},
  {el:'p3', r:90, speed:0.01},
  {el:'p4', r:120, speed:0.008},
  {el:'p5', r:170, speed:0.004},
  {el:'p6', r:210, speed:0.003},
  {el:'p7', r:250, speed:0.002}
];

function animate(){
  const t = Date.now();

  planets.forEach(p=>{
    const angle = t * p.speed;
    const x = 250 + Math.cos(angle) * p.r;
    const y = 250 + Math.sin(angle) * p.r;
    document.getElementById(p.el).setAttribute("cx",x);
    document.getElementById(p.el).setAttribute("cy",y);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
