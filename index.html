<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa e Federico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <button id="burger" class="burger">
    <span></span><span></span><span></span>
  </button>

  <nav id="menu" class="menu">
    <a href="index.html">Home</a>
    <a href="location.html">Location</a>
    <a href="rsvp.html">RSVP</a>
  </nav>
</header>

<main>

<section class="hero">
  <h1>Elisa e Federico</h1>
  <div class="subtitle">
    2 gennaio 2027<br>
    Abbazia Castel d'Alfiolo — Gubbio
  </div>

  <div class="solar-wrap">

    <svg viewBox="-120 -120 740 740" class="solar">

      <circle cx="250" cy="250" r="5" class="sun"/>

      <!-- orbite -->
      <g class="orbit" data-name="Mercurio">
        <circle cx="250" cy="250" r="40" class="line"/>
      </g>
      <g class="orbit" data-name="Venere">
        <circle cx="250" cy="250" r="65" class="line"/>
      </g>
      <g class="orbit" data-name="Terra">
        <circle cx="250" cy="250" r="90" class="line"/>
      </g>
      <g class="orbit" data-name="Marte">
        <circle cx="250" cy="250" r="120" class="line"/>
      </g>
      <g class="orbit" data-name="Giove">
        <circle cx="250" cy="250" r="170" class="line"/>
      </g>
      <g class="orbit" data-name="Saturno">
        <circle cx="250" cy="250" r="210" class="line"/>
      </g>
      <g class="orbit" data-name="Urano">
        <circle cx="250" cy="250" r="250" class="line"/>
      </g>
      <g class="orbit" data-name="Nettuno">
        <circle cx="250" cy="250" r="290" class="line"/>
      </g>
      <g class="orbit" data-name="Plutone">
        <circle cx="250" cy="250" r="330" class="line"/>
      </g>

      <!-- pianeti -->
      <circle id="p1" r="2" class="planet"/>
      <circle id="p2" r="3" class="planet"/>
      <circle id="p3" r="4" class="planet"/>
      <circle id="p4" r="3" class="planet"/>
      <circle id="p5" r="8" class="planet"/>
      <circle id="p6" r="7" class="planet"/>
      <circle id="p7" r="6" class="planet"/>
      <circle id="p8" r="6" class="planet"/>
      <circle id="p9" r="2" class="planet"/>

    </svg>

    <div id="label" class="label"></div>
  </div>
</section>

<section class="rsvp">
  <h2>Conferma la tua presenza</h2>
  <a href="rsvp.html" class="btn">RSVP</a>
</section>

</main>

<script>
/* menu */
const burger = document.getElementById('burger');
const menu = document.getElementById('menu');

burger.onclick = () => {
  burger.classList.toggle('open');
  menu.classList.toggle('open');
};

document.addEventListener('click', e=>{
  if(!e.target.closest('.burger') && !e.target.closest('.menu')){
    menu.classList.remove('open');
    burger.classList.remove('open');
  }
});

/* label */
const label = document.getElementById('label');

document.querySelectorAll('.orbit').forEach(o=>{
  o.addEventListener('pointerenter',()=>{
    label.textContent = o.dataset.name;
    label.style.opacity = 1;
  });
  o.addEventListener('pointerleave',()=>label.style.opacity=0);
});

/* pianeti */
const cfg = [
  {id:"p1", r:40, s:0.00012},
  {id:"p2", r:65, s:0.0001},
  {id:"p3", r:90, s:0.00008},
  {id:"p4", r:120, s:0.00006},
  {id:"p5", r:170, s:0.00004},
  {id:"p6", r:210, s:0.000035},
  {id:"p7", r:250, s:0.00003},
  {id:"p8", r:290, s:0.000025},
  {id:"p9", r:330, s:0.00002}
];

function animate(){
  const t = performance.now();

  cfg.forEach(p=>{
    const a = t * p.s;
    const x = 250 + Math.cos(a)*p.r;
    const y = 250 + Math.sin(a)*p.r;

    const el = document.getElementById(p.id);
    el.setAttribute("cx",x);
    el.setAttribute("cy",y);
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
