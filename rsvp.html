<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP — Elisa e Federico</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page">

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <button class="burger" id="burger" aria-label="Apri menu" type="button">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>

      <a href="index.html" class="header-title">Elisa e&nbsp;Federico</a>
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="it">IT</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>

      <nav class="menu" id="menu" aria-label="Navigazione">
        <a href="index.html">Home</a>
        <a href="location.html">Location</a>
        <a href="rsvp.html">RSVP</a>
        <a href="viaggio.html">Il nostro viaggio</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title" id="page-title">RSVP</h1>
      <div class="subtitle" id="subtitle">Conferma la tua presenza</div>

      <div style="width:84%; max-width: 900px; margin: 0 auto;">

        <div id="rsvp-it" class="rsvp-frame">
          <iframe
            style="border:none;width:100%;"
            id="elisa-e-federico-rsvp-afk5gc"
            src="https://opnform.com/forms/elisa-e-federico-rsvp-afk5gc">
          </iframe>
        </div>

        <div id="rsvp-en" class="rsvp-frame" hidden>
          <iframe
            style="border:none;width:100%;"
            id="elisa-e-federico-rsvp-inarm1"
            src="https://opnform.com/forms/elisa-e-federico-rsvp-inarm1">
          </iframe>
        </div>

        <script src="https://opnform.com/widgets/opnform-sdk.min.js"></script>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const file = location.pathname.split('/').pop() || 'index.html';
      const page = file.replace(/\.html$/, '') || 'index';
      const exts = ['jpg', 'jpeg', 'png', 'webp'];
      let i = 0;
      (function tryNext() {
        if (i >= exts.length) return;
        const url = 'images/' + page + '_background.' + exts[i++];
        const img = new Image();
        img.onload = function () {
          document.body.style.background = 'linear-gradient(rgba(245,240,230,0.72), rgba(245,240,230,0.72)), url("' + url + '") center center / cover fixed no-repeat';
        };
        img.onerror = tryNext;
        img.src = url;
      })();
    })();

    const translations = {
      it: {
        title: "RSVP",
        subtitle: "Conferma la tua presenza",
        home: "Home",
        location: "Location",
        rsvp: "RSVP",
        journey: "Il nostro viaggio"
      },
      en: {
        title: "RSVP",
        subtitle: "Please confirm your attendance",
        home: "Home",
        location: "Location",
        rsvp: "RSVP",
        journey: "Our honey moon"
      }
    };

    function detectLanguage() {
      const savedLang = localStorage.getItem('preferredLang');
      if (savedLang) return savedLang;
      const browserLang = navigator.language || navigator.userLanguage;
      return browserLang.startsWith('it') ? 'it' : 'en';
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      localStorage.setItem('preferredLang', lang);
      const t = translations[lang];
      document.getElementById('page-title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      const menuLinks = document.querySelectorAll('.menu a');
      if (menuLinks.length >= 4) {
        menuLinks[0].textContent = t.home;
        menuLinks[1].textContent = t.location;
        menuLinks[2].textContent = t.rsvp;
        menuLinks[3].textContent = t.journey;
      }

      const rsvpIt = document.getElementById('rsvp-it');
      const rsvpEn = document.getElementById('rsvp-en');
      if (rsvpIt && rsvpEn) {
        const isEn = lang === 'en';
        const toShow = isEn ? rsvpEn : rsvpIt;
        const toHide = isEn ? rsvpIt : rsvpEn;
        const wasHidden = toShow.hidden;
        toHide.hidden = true;
        toShow.hidden = false;
        if (wasHidden) {
          const f = toShow.querySelector('iframe');
          if (f && f.src) f.src = f.src;
        }
      }

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    const burger = document.getElementById('burger');
    const menu = document.getElementById('menu');
    let isMenuOpen = false;

    function toggleMenu() {
      isMenuOpen = !isMenuOpen;
      menu.classList.toggle('open');
      burger.classList.toggle('open');
      document.body.classList.toggle('menu-open');
    }

    function closeMenu() {
      isMenuOpen = false;
      menu.classList.remove('open');
      burger.classList.remove('open');
      document.body.classList.remove('menu-open');
    }

    burger.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleMenu();
    });

    document.addEventListener('click', (e) => {
      if (isMenuOpen && !menu.contains(e.target) && !burger.contains(e.target)) {
        closeMenu();
      }
    });

    document.querySelectorAll('.menu a').forEach(link => {
      link.addEventListener('click', () => {
        closeMenu();
      });
    });

    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');
        if (href && href.startsWith('#')) return;
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });

    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      const lang = detectLanguage();
      applyLanguage(lang);
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyLanguage(btn.dataset.lang);
      });
    });
  </script>

</body>
</html>
