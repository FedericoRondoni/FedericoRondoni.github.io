<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP — Elisa e Federico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page">

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <button class="burger" id="burger" aria-label="Apri menu" type="button">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>

      <div class="header-title">Elisa e Federico</div>
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="it">IT</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>

      <nav class="menu" id="menu" aria-label="Navigazione">
        <a href="index.html">Home</a>
        <a href="location.html">Location</a>
        <a href="rsvp.html">RSVP</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title" id="page-title">RSVP</h1>
      <div class="subtitle" id="subtitle">Conferma la tua presenza</div>

      <div style="width:84%; max-width: 900px; margin: 0 auto;">
        <iframe
          style="border:none;width:100%;"
          id="elisa-e-federico-rsvp-afk5gc"
          src="https://opnform.com/forms/elisa-e-federico-rsvp-afk5gc">
        </iframe>

        <script
          type="text/javascript"
          onload="initEmbed('elisa-e-federico-rsvp-afk5gc', { autoResize: true })"
          src="https://opnform.com/widgets/iframe.min.js">
        </script>
      </div>
    </div>
  </main>

  <script>
    // Language translations
    const translations = {
      it: {
        title: "RSVP",
        subtitle: "Conferma la tua presenza",
        home: "Home",
        location: "Location",
        rsvp: "RSVP"
      },
      en: {
        title: "RSVP",
        subtitle: "Please confirm your attendance",
        home: "Home",
        location: "Location",
        rsvp: "RSVP"
      }
    };

    // Detect user language preference
    function detectLanguage() {
      const savedLang = localStorage.getItem('preferredLang');
      if (savedLang) return savedLang;
      const browserLang = navigator.language || navigator.userLanguage;
      return browserLang.startsWith('it') ? 'it' : 'en';
    }

    // Apply language
    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      localStorage.setItem('preferredLang', lang);
      const t = translations[lang];
      document.getElementById('page-title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      const menuLinks = document.querySelectorAll('.menu a');
      if (menuLinks.length >= 3) {
        menuLinks[0].textContent = t.home;
        menuLinks[1].textContent = t.location;
        menuLinks[2].textContent = t.rsvp;
      }
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    const burger = document.getElementById('burger');
    const menu = document.getElementById('menu');
    let isMenuOpen = false;

    function toggleMenu() {
      isMenuOpen = !isMenuOpen;
      menu.classList.toggle('open');
      burger.classList.toggle('open');
      document.body.classList.toggle('menu-open');
    }

    function closeMenu() {
      isMenuOpen = false;
      menu.classList.remove('open');
      burger.classList.remove('open');
      document.body.classList.remove('menu-open');
    }

    burger.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleMenu();
    });

    document.addEventListener('click', (e) => {
      if (isMenuOpen && !menu.contains(e.target) && !burger.contains(e.target)) {
        closeMenu();
      }
    });

    document.querySelectorAll('.menu a').forEach(link => {
      link.addEventListener('click', () => {
        closeMenu();
      });
    });

    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');
        if (href && href.startsWith('#')) return;
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });

    // Initialize
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      const lang = detectLanguage();
      applyLanguage(lang);
    });

    // Language switcher
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyLanguage(btn.dataset.lang);
      });
    });
  </script>

</body>
</html>
