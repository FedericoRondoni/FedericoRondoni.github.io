<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP — Elisa e Federico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page">

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <button class="burger" id="burger" aria-label="Apri menu" type="button">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>

      <div class="header-title">Elisa e Federico</div>

      <nav class="menu" id="menu" aria-label="Navigazione">
        <a href="index.html">Home</a>
        <a href="location.html">Location</a>
        <a href="rsvp.html">RSVP</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">RSVP</h1>
      <div class="subtitle">Conferma la tua presenza</div>

      <div style="width:84%; max-width: 900px; margin: 0 auto;">
        <iframe
          style="border:none;width:100%;"
          id="elisa-e-federico-rsvp-afk5gc"
          src="https://opnform.com/forms/elisa-e-federico-rsvp-afk5gc">
        </iframe>

        <script
          type="text/javascript"
          onload="initEmbed('elisa-e-federico-rsvp-afk5gc', { autoResize: true })"
          src="https://opnform.com/widgets/iframe.min.js">
        </script>
      </div>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
    });

    const header = document.getElementById('siteHeader');
    const burger = document.getElementById('burger');
    const menu = document.getElementById('menu');
    let isMenuOpen = false;

    function toggleMenu() {
      isMenuOpen = !isMenuOpen;
      menu.classList.toggle('open');
      burger.classList.toggle('open');
      document.body.classList.toggle('menu-open');
    }

    function closeMenu() {
      isMenuOpen = false;
      menu.classList.remove('open');
      burger.classList.remove('open');
      document.body.classList.remove('menu-open');
    }

    burger.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleMenu();
    });

    // Chiudi menu se clicco fuori
    document.addEventListener('click', (e) => {
      if (isMenuOpen && !menu.contains(e.target) && !burger.contains(e.target)) {
        closeMenu();
      }
    });

    // Chiudi menu se clicco su un link
    document.querySelectorAll('.menu a').forEach(link => {
      link.addEventListener('click', () => {
        closeMenu();
      });
    });

    // Transizione tra pagine
    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function(e){
        const href = this.getAttribute('href');
        if (href && href.startsWith('#')) return;
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 600);
      });
    });
  </script>

</body>
</html>
